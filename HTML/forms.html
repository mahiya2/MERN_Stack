<!DOCTYPE html>
<html lang="en">
<head>

    <title>Forms</title>
    <link rel="stylesheet" href="../CSS/Position.css">

<body align="center">
    <div class="Data" id="Application">

            <h1>Forms</h1>

                    <br><br>

                    <br><br>
                    <label>Image :</label>

                    <br><br>

                </footer>
