<!DOCTYPE html>
<html lang="en">
<head>

<body align="center">
    <div class="Data" >
        <header id="Application">
            <h1>Forms</h1>
              </header>
            <main>
                <form>
                    <label>Name :</label>
                    <input id="name" type="text" placeholder="Fazeela"><br><br>
                    <label>Email :</label>
                    <input id="email" type="email" placeholder="fazz@gmail.com"><br><br>
                    <label>Password :</label>
                    <input id="pass" type="password" placeholder="Mahi252K05"><br><br>
                    <label >Phone No :</label>
                    <input id="number" type="number" placeholder="8986790"><br><br>
                    <label>Gender :</label>
                    <input type="radio" name="gender" id="1" value="male">Male
                    <input type="radio" name="gender" id="2" value="female">Female
                    <br><br>
                    <label>Qualification:</label>
                    <input class ="qualification" type="checkbox" value="Tenth">10 <sup>th</sup>
                    <input class ="qualification" type="checkbox" value="Twelve">12 <sup>th</sup>
                    <input class ="qualification" type="checkbox" value="Diploma">Diploma 
                    <input class ="qualification" type="checkbox" value="Bachelor">Bachelors 
                    <input class ="qualification" type="checkbox" value="Masters">Masters
                    <input class ="qualification" type="checkbox" value="Doctrate">Doctrate
                    <br><br>
                     <label>D.O.B</label> 
                    <input  id="dob" type="datetime-local">
                  <br><br> 
                     <label>Image :</label>
                    <input type="file" id="img"><br><br>
                    <button type="button" onclick="show()">SUBMIT</button>
                </form>
                 </main>
                <footer>
                    
                </footer>
    </div>

    </div>
